<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

    header {
      background: #1a1a2e; color: #fff; padding: 12px 20px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
    .header-btns { display: flex; gap: 8px; align-items: center; }
    header button { background: #2d2d4e; color: #ccc; border: 1px solid #444; border-radius: 4px; padding: 4px 10px; font-size: 0.8rem; cursor: pointer; }
    header button:hover { background: #3d3d6e; color: #fff; }
    .folder-name { font-size: 0.75rem; color: #aaa; }
    .git-badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 500;
      background: #2d2d4e; color: #aaa; border: 1px solid #444;
    }
    .git-badge.clean { background: #1b3a1b; color: #6fcf6f; border-color: #4a7a4a; }
    .git-badge.dirty { background: #3a2a1b; color: #f0a050; border-color: #7a5a2a; }
    .git-badge.conflict { background: #3a1b1b; color: #f06060; border-color: #7a3a3a; }

    .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; padding: 20px; }
    .setup-screen h2 { font-size: 1.2rem; color: #555; }
    .setup-screen p { font-size: 0.9rem; color: #777; text-align: center; max-width: 420px; line-height: 1.5; }
    .btn-primary { background: #4361ee; color: #fff; border: none; border-radius: 6px; padding: 10px 24px; font-size: 1rem; cursor: pointer; font-weight: 500; }
    .btn-primary:hover { background: #3451de; }
    .btn-sm { background: #4361ee; color: #fff; border: none; border-radius: 4px; padding: 5px 12px; font-size: 0.8rem; cursor: pointer; }
    .btn-sm:hover { background: #3451de; }
    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #c82333; }
    .btn-ghost { background: none; border: 1px solid #ccc; color: #555; border-radius: 4px; padding: 5px 12px; font-size: 0.8rem; cursor: pointer; }
    .btn-ghost:hover { background: #f0f0f0; }
    .btn-active { background: #4361ee; color: #fff; border: 1px solid #4361ee; border-radius: 4px; padding: 5px 12px; font-size: 0.8rem; cursor: pointer; }

    .toolbar { padding: 10px 20px; display: flex; gap: 8px; align-items: center; background: #fff; border-bottom: 1px solid #e0e0e0; }
    .toolbar input[type=search] { flex: 1; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; outline: none; }
    .toolbar input[type=search]:focus { border-color: #4361ee; }
    .search-mode-toggle { display: flex; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
    .search-mode-toggle button { border: none; border-radius: 0; padding: 5px 10px; font-size: 0.75rem; cursor: pointer; background: #fff; color: #666; }
    .search-mode-toggle button.active { background: #4361ee; color: #fff; }
    .search-mode-toggle button:not(:last-child) { border-right: 1px solid #ccc; }
    .model-pill { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .model-pill.loading { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
    .model-pill.ready   { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

    .list { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    .record-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 12px 16px; cursor: pointer; transition: box-shadow 0.1s; display: flex; flex-direction: column; gap: 4px; }
    .record-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #4361ee; }
    .record-card-top { display: flex; align-items: baseline; gap: 8px; }
    .record-card h3 { font-size: 0.95rem; font-weight: 500; flex: 1; }
    .score-badge { font-size: 0.7rem; font-weight: 700; padding: 1px 7px; border-radius: 10px; background: #ebefff; color: #4361ee; border: 1px solid #c5ceff; white-space: nowrap; }
    .record-meta { font-size: 0.75rem; color: #888; }
    .record-fields { display: flex; flex-wrap: wrap; gap: 6px; }
    .field-pill { background: #f0f2f5; border: 1px solid #e0e0e0; border-radius: 3px; padding: 2px 7px; font-size: 0.72rem; color: #555; }
    .field-pill strong { color: #333; }
    .empty-state { text-align: center; color: #aaa; padding: 40px; font-size: 0.9rem; }

    .edit-panel { background: #fff; border-radius: 8px; margin: 16px 20px; border: 1px solid #e0e0e0; padding: 20px; }
    .edit-panel h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: #555; margin-bottom: 4px; }
    .form-group input, .form-group textarea { width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: inherit; outline: none; }
    .form-group input:focus, .form-group textarea:focus { border-color: #4361ee; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .kv-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
    .kv-row input { flex: 1; }
    .kv-row textarea { flex: 2; }
    .form-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    .conflicts-panel { margin: 16px 20px; }
    .conflicts-panel > h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; color: #c0392b; }
    .conflicts-panel > p { font-size: 0.85rem; color: #666; margin-bottom: 16px; line-height: 1.5; }
    .conflict-card { background: #fff; border: 2px solid #e74c3c; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
    .conflict-card-header { background: #fdf2f2; padding: 10px 16px; border-bottom: 1px solid #f5c6c6; font-size: 0.85rem; font-weight: 600; color: #c0392b; }
    .conflict-field { padding: 12px 16px; border-bottom: 1px solid #f0e0e0; }
    .conflict-field:last-child { border-bottom: none; }
    .conflict-field-name { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .conflict-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .conflict-option { border: 2px solid #e0e0e0; border-radius: 6px; padding: 8px 12px; cursor: pointer; transition: all 0.1s; }
    .conflict-option:hover { border-color: #4361ee; background: #f5f7ff; }
    .conflict-option.selected { border-color: #4361ee; background: #ebefff; }
    .conflict-option-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; color: #888; }
    .conflict-option.selected .conflict-option-label { color: #4361ee; }
    .conflict-option-value { font-size: 0.85rem; color: #333; white-space: pre-wrap; word-break: break-word; }
    .conflicts-actions { display: flex; gap: 10px; margin-top: 8px; }

    .banner { border-radius: 6px; padding: 10px 14px; margin: 12px 20px; font-size: 0.82rem; }
    .banner-ok   { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
    .banner-warn { background: #fff3e0; border: 1px solid #ffcc80; color: #e65100; }

    .statusbar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; color: #aaa; font-size: 0.75rem; padding: 4px 16px; text-align: center; }
    body { padding-bottom: 28px; }
  </style>
</head>
<body>
  <div x-data="app" x-init="init()">

    <header>
      <h1>Research Tool</h1>
      <span class="folder-name" x-text="dirHandle ? '📁 ' + dirHandle.name : ''"></span>
      <template x-if="dirHandle">
        <span class="git-badge"
          :class="{ clean: gitStatus === 'clean', dirty: gitStatus === 'dirty', conflict: gitStatus === 'conflict' }"
          x-text="gitStatus === 'clean' ? '✓ committed' : gitStatus === 'dirty' ? '● unsaved' : '⚠ conflict'">
        </span>
      </template>
      <div class="header-btns">
        <template x-if="dirHandle && gitStatus === 'dirty'">
          <button @click="trySave()">Save now</button>
        </template>
        <button @click="pickFolder()" x-text="dirHandle ? 'Change folder' : 'Pick folder'"></button>
        <button @click="setUsername()">👤 <span x-text="username"></span></button>
      </div>
    </header>

    <template x-if="!fsaSupported">
      <div class="banner banner-warn">⚠️ File System Access API not supported. Requires Chrome or Edge 86+.</div>
    </template>

    <template x-if="fsaSupported && !dirHandle">
      <div class="setup-screen">
        <h2>Pick a folder to get started</h2>
        <p>Select a local folder or mapped network drive. The tool stores <code>data.json</code> and a <code>.git</code> directory there for versioned multi-user editing.</p>
        <button class="btn-primary" @click="pickFolder()">Pick folder</button>
      </div>
    </template>

    <template x-if="dirHandle">
      <div>
        <!-- List view -->
        <template x-if="view === 'list'">
          <div>
            <div class="toolbar">
              <input type="search"
                :placeholder="searchMode === 'semantic' ? 'Ask a question or describe what you\'re looking for…' : 'Search records…'"
                x-model="search"
                @input="onSearchInput()">

              <div class="search-mode-toggle">
                <button :class="{ active: searchMode === 'keyword' }" @click="setSearchMode('keyword')">Keyword</button>
                <button :class="{ active: searchMode === 'semantic' }" @click="setSearchMode('semantic')">Semantic</button>
              </div>

              <template x-if="searchMode === 'semantic'">
                <span class="model-pill" :class="modelState === 'ready' ? 'ready' : 'loading'"
                  x-text="modelState === 'ready' ? '🧠 ready' : modelState === 'loading' ? '⏳ loading model…' : '🧠 idle'">
                </span>
              </template>

              <button class="btn-sm" @click="newRecord()">+ New record</button>
            </div>

            <div class="list">
              <template x-if="filteredRecords.length === 0">
                <div class="empty-state">
                  <template x-if="searchMode === 'semantic' && modelState === 'loading'">
                    <span>Loading embedding model (~23 MB)…</span>
                  </template>
                  <template x-if="!(searchMode === 'semantic' && modelState === 'loading')">
                    <template x-if="search">
                      <span>No records match "<span x-text="search"></span>"</span>
                    </template>
                    <template x-if="!search">
                      <span>No records yet. Create your first record.</span>
                    </template>
                  </template>
                </div>
              </template>

              <template x-for="item in filteredRecords" :key="item.id">
                <div class="record-card" @click="editRecord(item.id)">
                  <div class="record-card-top">
                    <h3 x-text="item.rec.title || '(untitled)'"></h3>
                    <template x-if="item.score !== null">
                      <span class="score-badge" x-text="Math.round(item.score * 100) + '% match'"></span>
                    </template>
                  </div>
                  <div class="record-meta">
                    <span x-text="item.id"></span>&nbsp;·&nbsp;
                    <span x-text="item.rec._updated_by || '?'"></span>&nbsp;·&nbsp;
                    <span x-text="item.rec._updated_at ? new Date(item.rec._updated_at).toLocaleString() : ''"></span>
                  </div>
                  <template x-if="userFields(item.rec).length > 0">
                    <div class="record-fields">
                      <template x-for="[k, v] in userFields(item.rec)" :key="k">
                        <span class="field-pill"><strong x-text="k"></strong>:&nbsp;<span x-text="String(v).slice(0, 60)"></span></span>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Edit view -->
        <template x-if="view === 'edit'">
          <div class="edit-panel">
            <h2 x-text="editingId ? 'Edit record' : 'New record'"></h2>
            <div class="form-group">
              <label>Title</label>
              <input type="text" x-model="editForm.title" placeholder="Record title">
            </div>
            <div class="form-group">
              <label>Fields</label>
              <template x-for="(field, idx) in editForm.fields" :key="idx">
                <div class="kv-row">
                  <input type="text" placeholder="key" x-model="field.key">
                  <textarea placeholder="value" x-model="field.value" rows="2"></textarea>
                  <button class="btn-sm btn-danger" @click="removeField(idx)">✕</button>
                </div>
              </template>
              <button class="btn-ghost" @click="addField()">+ Add field</button>
            </div>
            <div class="form-actions">
              <button class="btn-primary" @click="saveRecord()">Save</button>
              <button class="btn-ghost" @click="view = 'list'">Cancel</button>
              <template x-if="editingId">
                <button class="btn-sm btn-danger" style="margin-left:auto" @click="deleteRecord(editingId)">Delete</button>
              </template>
            </div>
          </div>
        </template>

        <!-- Conflict resolution view -->
        <template x-if="view === 'conflicts'">
          <div class="conflicts-panel">
            <h2>⚠ Merge Conflict</h2>
            <p>Someone else saved changes to this folder while you were editing. The tool auto-merged non-overlapping changes. Resolve the fields below, then confirm to save.</p>
            <template x-for="conflict in pendingMerge.conflicts" :key="conflict.id">
              <div class="conflict-card">
                <div class="conflict-card-header"
                  x-text="conflict.id + (pendingMerge.merged[conflict.id]?.title ? ' — ' + pendingMerge.merged[conflict.id].title : '')">
                </div>
                <template x-for="field in conflict.fields" :key="field.field">
                  <div class="conflict-field">
                    <div class="conflict-field-name" x-text="field.field"></div>
                    <div class="conflict-options">
                      <div class="conflict-option"
                        :class="{ selected: pendingMerge.merged[conflict.id]?.[field.field] === field.ours }"
                        @click="resolveField(conflict.id, field.field, field.ours)">
                        <div class="conflict-option-label">Mine (<span x-text="username"></span>)</div>
                        <div class="conflict-option-value" x-text="field.ours ?? '(deleted)'"></div>
                      </div>
                      <div class="conflict-option"
                        :class="{ selected: pendingMerge.merged[conflict.id]?.[field.field] !== field.ours }"
                        @click="resolveField(conflict.id, field.field, field.theirs)">
                        <div class="conflict-option-label">Theirs</div>
                        <div class="conflict-option-value" x-text="field.theirs ?? '(deleted)'"></div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <div class="conflicts-actions">
              <button class="btn-primary" @click="commitResolved()">Confirm &amp; Save resolved</button>
              <button class="btn-ghost" @click="view = 'list'">Cancel (discard my changes)</button>
            </div>
          </div>
        </template>
      </div>
    </template>

    <div class="statusbar" x-text="status"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "idb-keyval": "https://cdn.jsdelivr.net/npm/idb-keyval@6/+esm",
      "isomorphic-git": "https://esm.sh/isomorphic-git@1",
      "@huggingface/transformers": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/+esm"
    }
  }
  </script>

  <script type="module">
    import { get, set } from 'idb-keyval';
    import * as git from 'isomorphic-git';
    import { pipeline, env } from '@huggingface/transformers';

    env.allowLocalModels = false; // always load from HF Hub for this proof

    // ─── FSA → isomorphic-git adapter ─────────────────────────────────────────

    const _adapterCache = new WeakMap();

    function _splitPath(p) { return p.split('/').filter(s => s && s !== '.'); }
    function _splitParentAndName(p) { const parts = _splitPath(p); const name = parts.pop(); return { parentPath: parts.join('/'), name }; }

    function createFsaAdapter(rootHandle) {
      if (_adapterCache.has(rootHandle)) return _adapterCache.get(rootHandle);
      const hc = new Map();
      const getHandle = async (pathStr) => {
        if (!pathStr || pathStr === '.' || pathStr === '/') return rootHandle;
        if (hc.has(pathStr)) return hc.get(pathStr);
        const parts = _splitPath(pathStr);
        let cur = rootHandle, curPath = '';
        for (let i = 0; i < parts.length; i++) {
          const p = parts[i];
          curPath += (curPath ? '/' : '') + p;
          if (hc.has(curPath)) { cur = hc.get(curPath); continue; }
          try {
            cur = i < parts.length - 1
              ? await cur.getDirectoryHandle(p)
              : await (async () => { try { return await cur.getFileHandle(p); } catch { return await cur.getDirectoryHandle(p); } })();
            hc.set(curPath, cur);
          } catch { throw Object.assign(new Error(`ENOENT: ${pathStr}`), { code: 'ENOENT' }); }
        }
        return cur;
      };
      const fs = {
        async readFile(path, opts) {
          const h = await getHandle(path);
          if (h.kind !== 'file') throw Object.assign(new Error('EISDIR'), { code: 'EISDIR' });
          const u8 = new Uint8Array(await (await h.getFile()).arrayBuffer());
          const enc = typeof opts === 'string' ? opts : opts?.encoding;
          return (enc === 'utf8' || enc === 'utf-8') ? new TextDecoder().decode(u8) : u8;
        },
        async writeFile(path, data) {
          const { parentPath, name } = _splitParentAndName(path);
          let d = rootHandle;
          for (const p of _splitPath(parentPath)) d = await d.getDirectoryHandle(p, { create: true });
          const w = await (await d.getFileHandle(name, { create: true })).createWritable();
          await w.write(data); await w.close(); hc.delete(path);
        },
        async readdir(path) {
          const h = await getHandle(path || '.');
          if (h.kind !== 'directory') throw Object.assign(new Error('ENOTDIR'), { code: 'ENOTDIR' });
          const r = []; for await (const n of h.keys()) r.push(n); return r;
        },
        async stat(path) {
          const h = await getHandle(path || '.');
          const isFile = h.kind === 'file', f = isFile ? await h.getFile() : null;
          const ms = f ? f.lastModified : Date.now();
          return { isFile: () => isFile, isDirectory: () => !isFile, isSymbolicLink: () => false,
            size: f?.size ?? 0, mtimeMs: ms, mtime: new Date(ms), ctimeMs: ms, ctime: new Date(ms),
            atimeMs: ms, atime: new Date(ms), mode: isFile ? 0o100644 : 0o040755, uid: 0, gid: 0, dev: 0, ino: 0 };
        },
        async lstat(path) { return fs.stat(path); },
        async unlink(path) { const { parentPath, name } = _splitParentAndName(path); await (await getHandle(parentPath)).removeEntry(name); hc.delete(path); },
        async mkdir(path) { let c = rootHandle; for (const p of _splitPath(path)) c = await c.getDirectoryHandle(p, { create: true }); },
        async rmdir(path) { const { parentPath, name } = _splitParentAndName(path); await (await getHandle(parentPath)).removeEntry(name, { recursive: true }); hc.delete(path); },
        async readlink() { return ''; },
        async symlink() {},
      };
      fs.promises = fs;
      _adapterCache.set(rootHandle, fs);
      return fs;
    }

    // ─── Utilities ─────────────────────────────────────────────────────────────

    function serialize(data) {
      const s = o => Object.fromEntries(Object.keys(o).sort().map(k => [k, o[k]]));
      const top = s(data);
      for (const id of Object.keys(top))
        if (top[id] && typeof top[id] === 'object' && !Array.isArray(top[id])) top[id] = s(top[id]);
      return JSON.stringify(top, null, 2);
    }
    const deepCopy = o => JSON.parse(JSON.stringify(o));
    const newId = () => 'REC-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6).toUpperCase();

    // ─── Three-way merge ───────────────────────────────────────────────────────

    function threeWayMerge(base, ours, theirs) {
      const conflicts = [], result = {};
      const eq = (x, y) => JSON.stringify(x) === JSON.stringify(y);
      const allIds = new Set([...Object.keys(base), ...Object.keys(ours), ...Object.keys(theirs)]);
      for (const id of allIds) {
        const b = base[id], o = ours[id], t = theirs[id];
        if (!o && b && eq(b, t)) continue;
        if (!t && b && eq(b, o)) continue;
        if (!o && !t) continue;
        if (!o && b && !eq(b, t)) { conflicts.push({ id, type: 'delete-vs-edit', fields: [{ field: '(record)', base: b, ours: null, theirs: t }] }); result[id] = t; continue; }
        if (!t && b && !eq(b, o)) { conflicts.push({ id, type: 'edit-vs-delete', fields: [{ field: '(record)', base: b, ours: o, theirs: null }] }); result[id] = o; continue; }
        if (!b && o && !t) { result[id] = o; continue; }
        if (!b && !o && t) { result[id] = t; continue; }
        if (!b && o && t && eq(o, t)) { result[id] = o; continue; }
        const mergedRec = {}, fieldConflicts = [];
        const allFields = new Set([...Object.keys(b ?? {}), ...Object.keys(o ?? {}), ...Object.keys(t ?? {})]);
        for (const field of allFields) {
          const bv = b?.[field], ov = o?.[field], tv = t?.[field];
          if (field === '_updated_at') { mergedRec[field] = (ov ?? '') > (tv ?? '') ? ov : tv; continue; }
          if (field === '_updated_by') { mergedRec[field] = (o?._updated_at ?? '') > (t?._updated_at ?? '') ? ov : tv; continue; }
          if (field.startsWith('_')) { mergedRec[field] = ov ?? tv; continue; }
          const oc = !eq(ov, bv), tc = !eq(tv, bv);
          if (!oc && !tc) mergedRec[field] = bv;
          else if (oc && !tc) mergedRec[field] = ov;
          else if (!oc && tc) mergedRec[field] = tv;
          else if (eq(ov, tv)) mergedRec[field] = ov;
          else { fieldConflicts.push({ field, base: bv, ours: ov, theirs: tv }); mergedRec[field] = ov; }
        }
        if (fieldConflicts.length > 0) conflicts.push({ id, type: 'field', fields: fieldConflicts });
        result[id] = mergedRec;
      }
      return { data: result, conflicts };
    }

    // ─── Embeddings ────────────────────────────────────────────────────────────

    const MODEL_ID = 'Xenova/all-MiniLM-L6-v2';
    const EMBEDDINGS_FILE = 'embeddings.json';

    let embedder = null;
    let embeddings = {};      // { id: number[] }
    let searchDebounce = null;

    function recordText(rec) {
      const parts = [rec.title || ''];
      for (const [k, v] of Object.entries(rec))
        if (!k.startsWith('_') && k !== 'title') parts.push(`${k}: ${v}`);
      return parts.filter(Boolean).join(' ');
    }

    function cosineSim(a, b) {
      let dot = 0;
      for (let i = 0; i < a.length; i++) dot += a[i] * b[i];
      return dot; // both vectors are already unit-normalised
    }

    async function loadEmbeddings(dirHandle) {
      try {
        const fh = await dirHandle.getFileHandle(EMBEDDINGS_FILE);
        const text = await (await fh.getFile()).text();
        embeddings = JSON.parse(text);
      } catch { embeddings = {}; }
    }

    async function saveEmbeddings(dirHandle) {
      try {
        const fh = await dirHandle.getFileHandle(EMBEDDINGS_FILE, { create: true });
        const w = await fh.createWritable();
        await w.write(JSON.stringify(embeddings));
        await w.close();
      } catch { /* non-fatal */ }
    }

    async function embedRecord(id, rec) {
      if (!embedder) return;
      const text = recordText(rec);
      const out = await embedder(text, { pooling: 'mean', normalize: true });
      embeddings[id] = Array.from(out.data);
    }

    async function embedMissing(records, dirHandle, onProgress) {
      const missing = Object.keys(records).filter(id => !embeddings[id]);
      if (missing.length === 0) return;
      let done = 0;
      for (const id of missing) {
        await embedRecord(id, records[id]);
        done++;
        if (onProgress) onProgress(done, missing.length);
      }
      await saveEmbeddings(dirHandle);
    }

    // ─── Module-level state ────────────────────────────────────────────────────

    let fsAdapter = null;
    let baseData = {};
    let baseCommit = null;
    let autoSaveTimer = null;
    let isSaving = false;

    // ─── Alpine component ──────────────────────────────────────────────────────

    document.addEventListener('alpine:init', () => {
      Alpine.data('app', () => ({
        fsaSupported: typeof window.showDirectoryPicker === 'function',
        dirHandle: null,
        username: localStorage.getItem('username') || 'user',
        records: {},
        search: '',
        searchMode: 'keyword',   // 'keyword' | 'semantic'
        modelState: 'idle',      // 'idle' | 'loading' | 'ready' | 'error'
        semanticResults: null,   // [{ id, rec, score }] | null
        view: 'list',
        editingId: null,
        editForm: { title: '', fields: [] },
        status: 'Pick a folder to begin.',
        gitStatus: 'clean',
        pendingMerge: null,

        async init() {
          if (!this.fsaSupported) { this.status = 'File System Access API not supported.'; return; }
          const stored = await get('dirHandle');
          if (stored) {
            try {
              const perm = await stored.requestPermission({ mode: 'readwrite' });
              if (perm === 'granted') {
                this.dirHandle = stored;
                fsAdapter = createFsaAdapter(stored);
                await this._ensureGit();
                await this._loadAndTrackBase();
                await loadEmbeddings(stored);
                this._startAutoSave();
              } else {
                this.status = 'Permission denied. Pick the folder again.';
              }
            } catch { this.status = 'Stored folder inaccessible. Pick a new folder.'; }
          }
          this.$watch('search', () => this._onSearchChanged());
          this.$watch('searchMode', () => this._onSearchChanged());
        },

        async pickFolder() {
          try {
            const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
            await set('dirHandle', handle);
            this.dirHandle = handle;
            fsAdapter = createFsaAdapter(handle);
            await this._ensureGit();
            await this._loadAndTrackBase();
            await loadEmbeddings(handle);
            this._startAutoSave();
          } catch (e) {
            if (e.name !== 'AbortError') this.status = 'Error: ' + e.message;
          }
        },

        // ── Semantic search ──

        setSearchMode(mode) {
          this.searchMode = mode;
          if (mode === 'semantic' && this.modelState === 'idle') this._loadModel();
        },

        async _loadModel() {
          this.modelState = 'loading';
          this.status = 'Loading embedding model (~23 MB)…';
          try {
            embedder = await pipeline('feature-extraction', MODEL_ID, { quantized: true });
            this.modelState = 'ready';
            this.status = 'Embedding model ready.';
            // Embed any records that are missing embeddings
            await embedMissing(this.records, this.dirHandle, (done, total) => {
              this.status = `Computing embeddings… ${done}/${total}`;
            });
            if (this.search.trim()) this._runSemanticSearch(this.search);
          } catch (e) {
            this.modelState = 'error';
            this.status = 'Model load error: ' + e.message;
          }
        },

        _onSearchChanged() {
          if (this.searchMode === 'keyword') {
            this.semanticResults = null;
            return;
          }
          // Semantic mode
          if (!this.search.trim()) { this.semanticResults = null; return; }
          if (this.modelState === 'idle') { this._loadModel(); return; }
          if (this.modelState !== 'ready') return;
          clearTimeout(searchDebounce);
          searchDebounce = setTimeout(() => this._runSemanticSearch(this.search), 350);
        },

        async _runSemanticSearch(query) {
          if (!embedder || !query.trim()) { this.semanticResults = null; return; }
          try {
            const out = await embedder(query.trim(), { pooling: 'mean', normalize: true });
            const qVec = Array.from(out.data);
            const results = Object.entries(this.records)
              .filter(([id]) => embeddings[id])
              .map(([id, rec]) => ({ id, rec, score: cosineSim(qVec, embeddings[id]) }))
              .filter(r => r.score > 0.2)
              .sort((a, b) => b.score - a.score)
              .slice(0, 20);
            this.semanticResults = results;
          } catch (e) {
            this.status = 'Search error: ' + e.message;
          }
        },

        // ── Record list ──

        get filteredRecords() {
          if (this.searchMode === 'semantic' && this.search.trim()) {
            return this.semanticResults ?? [];
          }
          const q = this.searchMode === 'keyword' ? this.search.trim().toLowerCase() : '';
          return Object.entries(this.records)
            .filter(([id, r]) => !q || [id, ...Object.values(r).map(String)].join(' ').toLowerCase().includes(q))
            .sort((a, b) => (b[1]._updated_at || '').localeCompare(a[1]._updated_at || ''))
            .map(([id, rec]) => ({ id, rec, score: null }));
        },

        onSearchInput() {
          // Clears semanticResults immediately when field is emptied
          if (!this.search.trim()) this.semanticResults = null;
        },

        userFields(rec) {
          const reserved = new Set(['title', '_id', '_updated_by', '_updated_at']);
          return Object.entries(rec).filter(([k]) => !reserved.has(k));
        },

        // ── Git ──

        async _ensureGit() {
          try {
            await git.resolveRef({ fs: fsAdapter, dir: '/', ref: 'HEAD' });
          } catch {
            await git.init({ fs: fsAdapter, dir: '/', defaultBranch: 'main' });
            try { await git.add({ fs: fsAdapter, dir: '/', filepath: 'data.json' }); await this._doCommit('Initial commit'); } catch {}
          }
        },

        async _loadAndTrackBase() {
          try {
            const fh = await this.dirHandle.getFileHandle('data.json', { create: true });
            const text = await (await fh.getFile()).text();
            const data = text.trim() ? JSON.parse(text) : {};
            this.records = data;
            baseData = deepCopy(data);
            baseCommit = await this._headSha();
            const n = Object.keys(data).length;
            this.status = n === 0 ? 'Folder connected. No records yet.' : `Loaded ${n} record${n === 1 ? '' : 's'}.`;
            this.gitStatus = 'clean';
          } catch (e) { this.status = 'Load error: ' + e.message; }
        },

        async _headSha() {
          try { return await git.resolveRef({ fs: fsAdapter, dir: '/', ref: 'HEAD' }); } catch { return null; }
        },

        async _doCommit(message) {
          return git.commit({
            fs: fsAdapter, dir: '/',
            message: message ?? `Update by ${this.username} at ${new Date().toISOString()}`,
            author: { name: this.username, email: `${this.username.replace(/\s+/g, '.')}@local`,
              timestamp: Math.floor(Date.now() / 1000), timezoneOffset: new Date().getTimezoneOffset() },
          });
        },

        async _writeAndCommit(data) {
          const fh = await this.dirHandle.getFileHandle('data.json', { create: true });
          const w = await fh.createWritable();
          await w.write(serialize(data)); await w.close();
          await git.add({ fs: fsAdapter, dir: '/', filepath: 'data.json' });
          const sha = await this._doCommit();
          baseData = deepCopy(data); baseCommit = sha;
          this.gitStatus = 'clean';
          this.status = `Saved & committed ${Object.keys(data).length} records.`;
        },

        async trySave() {
          if (isSaving || this.gitStatus !== 'dirty') return;
          isSaving = true;
          try {
            const currentHead = await this._headSha();
            if (currentHead === baseCommit) {
              await this._writeAndCommit(this.records);
            } else {
              const fh = await this.dirHandle.getFileHandle('data.json');
              const diskData = JSON.parse((await (await fh.getFile()).text()) || '{}');
              const { data: merged, conflicts } = threeWayMerge(baseData, this.records, diskData);
              if (conflicts.length > 0) {
                this.records = merged;
                this.pendingMerge = { merged: deepCopy(merged), conflicts };
                this.view = 'conflicts'; this.gitStatus = 'conflict';
                this.status = `${conflicts.length} conflict${conflicts.length === 1 ? '' : 's'} need resolving.`;
                baseCommit = currentHead;
              } else {
                this.records = merged;
                await this._writeAndCommit(merged);
              }
            }
          } catch (e) { this.status = 'Save error: ' + e.message; }
          finally { isSaving = false; }
        },

        _startAutoSave() {
          if (autoSaveTimer) clearInterval(autoSaveTimer);
          autoSaveTimer = setInterval(() => this.trySave(), 30_000);
        },

        // ── Conflict resolution ──

        resolveField(recordId, field, value) {
          const rec = this.pendingMerge.merged[recordId];
          if (rec) rec[field] = value;
          this.pendingMerge = { ...this.pendingMerge, merged: { ...this.pendingMerge.merged } };
        },

        async commitResolved() {
          this.records = this.pendingMerge.merged;
          this.pendingMerge = null; this.gitStatus = 'dirty';
          await this._writeAndCommit(this.records);
          this.view = 'list';
        },

        // ── Record CRUD ──

        newRecord() { this.editingId = null; this.editForm = { title: '', fields: [] }; this.view = 'edit'; },

        editRecord(id) {
          const r = this.records[id];
          const reserved = new Set(['title', '_id', '_updated_by', '_updated_at']);
          this.editForm = { title: r.title || '', fields: Object.entries(r).filter(([k]) => !reserved.has(k)).map(([key, value]) => ({ key, value: String(value) })) };
          this.editingId = id; this.view = 'edit';
        },

        addField() { this.editForm.fields.push({ key: '', value: '' }); },
        removeField(idx) { this.editForm.fields.splice(idx, 1); },

        async saveRecord() {
          const id = this.editingId || newId();
          const record = { _id: id, _updated_at: new Date().toISOString(), _updated_by: this.username, title: this.editForm.title || '(untitled)' };
          for (const { key, value } of this.editForm.fields) { const k = key.trim(); if (k && !k.startsWith('_')) record[k] = value; }
          this.records = { ...this.records, [id]: record };
          this.gitStatus = 'dirty'; this.view = 'list';
          // Update embedding for this record in the background
          if (embedder) {
            embedRecord(id, record).then(() => saveEmbeddings(this.dirHandle));
            // Re-run semantic search if active
            if (this.searchMode === 'semantic' && this.search.trim()) this._runSemanticSearch(this.search);
          }
          await this.trySave();
        },

        async deleteRecord(id) {
          if (!confirm('Delete this record?')) return;
          const updated = { ...this.records }; delete updated[id]; delete embeddings[id];
          this.records = updated; this.gitStatus = 'dirty'; this.view = 'list';
          saveEmbeddings(this.dirHandle);
          await this.trySave();
        },

        setUsername() {
          const name = prompt('Enter your name (used in _updated_by):', this.username);
          if (name?.trim()) { this.username = name.trim(); localStorage.setItem('username', this.username); this.status = `Username set to "${this.username}".`; }
        },
      }));
    });
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</body>
</html>
